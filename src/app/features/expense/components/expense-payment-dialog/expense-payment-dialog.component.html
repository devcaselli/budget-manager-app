<div class="payment-dialog__head" mat-dialog-title>
  <div>
    <h2 class="payment-dialog__title">Pay <em>expense</em></h2>
    <p class="payment-dialog__subtitle">
      {{ data.expense.name }} · {{ data.expense.remaining }} open
    </p>
  </div>
  <button
    class="payment-dialog__close"
    type="button"
    mat-dialog-close
    aria-label="Close"
  >×</button>
</div>

<mat-dialog-content class="payment-dialog__body">
  <form class="payment-dialog__form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="ew-field">
      <label for="pay-bullet">Bullet *</label>
      <select id="pay-bullet" class="ew-select" formControlName="bulletId">
        <option value="" disabled>Choose a bullet...</option>
        @for (bullet of data.bullets; track bullet.id) {
          <option [value]="bullet.id">
            {{ bullet.description }} · {{ bullet.remaining }} available
          </option>
        }
      </select>
      @if (form.controls.bulletId.touched && form.controls.bulletId.invalid) {
        <p class="payment-dialog__error">Choose a bullet.</p>
      }
    </div>

    <div class="ew-field">
      <label for="pay-amount">Amount *</label>
      <input
        id="pay-amount"
        class="ew-input"
        type="number"
        min="0.01"
        step="0.01"
        formControlName="amount"
      />
      @if (form.controls.amount.touched && form.controls.amount.invalid) {
        <p class="payment-dialog__error">Enter a valid amount.</p>
      }
    </div>

    <div class="ew-field">
      <label for="pay-note">Description</label>
      <input
        id="pay-note"
        class="ew-input"
        formControlName="details"
        placeholder="optional note"
      />
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions class="payment-dialog__actions" align="end">
  <button class="ew-btn ew-btn--ghost" type="button" mat-dialog-close>Cancel</button>
  <button class="ew-btn ew-btn--primary" type="button" (click)="submit()">
    <mat-icon aria-hidden="true">payments</mat-icon>
    Pay
  </button>
</mat-dialog-actions>
