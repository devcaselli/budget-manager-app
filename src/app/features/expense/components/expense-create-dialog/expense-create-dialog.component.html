<h2 mat-dialog-title>Nova transacao</h2>

<form class="expense-create-dialog__form" [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content class="expense-create-dialog__content">
    <p class="expense-create-dialog__wallet">{{ data.walletDescription }}</p>

    <mat-form-field appearance="outline">
      <mat-label>Nome</mat-label>
      <input #nameInput matInput formControlName="name" placeholder="Ex.: Mercado" />
      @if (form.controls.name.touched && form.controls.name.invalid) {
        <mat-error>Informe um nome.</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Custo</mat-label>
      <input matInput type="number" min="0.01" step="0.01" formControlName="cost" />
      @if (form.controls.cost.touched && form.controls.cost.invalid) {
        <mat-error>Informe um valor maior que zero.</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Compra</mat-label>
      <input matInput type="date" formControlName="purchaseDate" />
    </mat-form-field>

    <mat-checkbox class="expense-create-dialog__keep-open" formControlName="keepOpen">
      Manter aberto apos cadastrar
    </mat-checkbox>
  </mat-dialog-content>

  <mat-dialog-actions class="expense-create-dialog__actions" align="end">
    <button mat-button type="button" mat-dialog-close>Cancelar</button>
    <button mat-flat-button type="submit">
      <mat-icon aria-hidden="true">add</mat-icon>
      Criar expense
    </button>
  </mat-dialog-actions>
</form>
