<div class="wallet-page">
  <!-- ── Page header ──────────────────────────────────────────────── -->
  <div class="ew-page-head">
    <div>
      <div class="ew-eyebrow">02 · Wallets</div>
      <h1 class="ew-page-title">Carve out <em>a cycle.</em></h1>
      <p class="ew-page-sub">
        Each wallet is a single budget for a single month. Open it, watch it spend itself down, close it.
      </p>
    </div>
    <div class="ew-head-meta">
      total wallets · <b>{{ wallets().length }}</b><br>
      cap aggregate · <b class="ew-blur">{{ totalCap() | brlCurrency }}</b>
    </div>
  </div>

  @if (errorMessage()) {
    <div class="ew-alert" role="alert">{{ errorMessage() }}</div>
  }

  <!-- ── Layout ────────────────────────────────────────────────────── -->
  <div class="wallet-page__content">
    <!-- Left: detail card + list -->
    <div class="ew-col-stack">
      <app-wallet-detail [wallet]="selectedWallet()" [isLoading]="isLoading()" />

      <app-wallet-list
        [wallets]="wallets()"
        [selectedWalletId]="selectedWallet()?.id ?? null"
        [isLoading]="isLoading()"
        (walletSelect)="selectWallet($event)"
      />
    </div>

    <!-- Right: form -->
    <app-wallet-form
      [isSaving]="isSaving()"
      [resetCount]="formResetCount()"
      (walletCreate)="createWallet($event)"
    />
  </div>
</div>
