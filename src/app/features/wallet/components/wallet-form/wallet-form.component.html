<div class="ew-panel">
  <div class="ew-panel-head">
    <div>
      <h3>Open <em>new wallet</em></h3>
      <p>Define cycle &amp; cap</p>
    </div>
  </div>
  <div class="ew-panel-body">
    <form class="ew-form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="ew-field">
        <label for="wf-description">Description</label>
        <input
          id="wf-description"
          class="ew-input"
          formControlName="description"
          placeholder="e.g. May expenses"
        />
      </div>

      <div class="ew-field">
        <label for="wf-budget">Budget cap</label>
        <input
          id="wf-budget"
          class="ew-input"
          type="number"
          min="0.01"
          step="0.01"
          formControlName="budget"
          placeholder="R$ 0.00"
        />
      </div>

      <div class="ew-row-form">
        <div class="ew-field">
          <label for="wf-start">Open date</label>
          <input id="wf-start" class="ew-input" type="date" formControlName="startDate" />
        </div>
        <div class="ew-field">
          <label for="wf-effective">Effective</label>
          <input id="wf-effective" class="ew-input" type="month" formControlName="effectiveMonth" />
        </div>
      </div>

      <div class="ew-row-form">
        <div class="ew-field">
          <label for="wf-state">State</label>
          <select id="wf-state" class="ew-select" formControlName="state">
            <option value="PRODUCTION">Production</option>
            <option value="PREVIEW">Preview</option>
            <option value="REVIEW">Review</option>
          </select>
        </div>
        <div class="ew-field">
          <label for="wf-closes">Closes</label>
          <input id="wf-closes" class="ew-input" type="date" formControlName="closedDate" />
        </div>
      </div>

      <button
        class="ew-checkbox"
        type="button"
        [class.ew-checkbox--on]="form.controls.closed.value"
        (click)="form.controls.closed.setValue(!form.controls.closed.value)"
      >
        <i></i>
        <span>Open as closed</span>
      </button>

      <button class="ew-btn-submit" type="submit" [disabled]="isSaving()">
        {{ isSaving() ? 'Opening...' : 'Open wallet' }}
      </button>
    </form>
  </div>
</div>
