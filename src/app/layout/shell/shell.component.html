<mat-sidenav-container class="shell">
  <mat-sidenav
    #drawer
    class="shell__sidenav"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset()"
  >
    <div class="shell__brand">
      <mat-icon aria-hidden="true">account_balance_wallet</mat-icon>
      <div>
        <strong>Budget Manager</strong>
        <span>Controle financeiro</span>
      </div>
    </div>

    <mat-nav-list aria-label="Navegacao principal">
      @for (item of navItems; track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="mdc-list-item--activated"
          [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
          (click)="isHandset() && drawer.close()"
        >
          <mat-icon matListItemIcon aria-hidden="true">{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="shell__content">
    <mat-toolbar class="shell__toolbar">
      @if (isHandset()) {
        <button
          mat-icon-button
          type="button"
          aria-label="Abrir menu"
          (click)="drawer.toggle()"
        >
          <mat-icon aria-hidden="true">menu</mat-icon>
        </button>
      }

      <span class="shell__toolbar-title">{{ appName }}</span>
      <span class="shell__toolbar-spacer"></span>
      <button mat-stroked-button type="button" disabled>
        <mat-icon aria-hidden="true">add</mat-icon>
        Nova transacao
      </button>
    </mat-toolbar>

    <main class="shell__main">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
